## dev

[feature.dev.dependencies]
pixi-pycharm = "*"
ipython = "*"
python-semantic-release = "*"

## test-upstream-dev

[feature.test-upstream-dev.pypi-dependencies]
numpy = { version = "*", index = "https://pypi.anaconda.org/scientific-python-nightly-wheels/simple" }

## xp-tests

[feature.xp-tests.dependencies]
pytest-json-report = "*"
hypothesis = "*"
ndindex = "*"
array-api-compat = "*"

[feature.xp-tests.tasks.clean-xp-tests]
# clean array-api-tests dir
cmd = "rm -rf array-api-tests"
default-environment = "ci-py313"

[feature.xp-tests.tasks.clone-xp-tests]
# clone array-api-tests
cmd = "git clone https://github.com/data-apis/array-api-tests.git"
depends-on = ["clean-xp-tests"]
default-environment = "ci-py313"

[feature.xp-tests.tasks.checkout-xp-tests]
# checkout array-api-tests commit
cmd = [
  "git",
  "reset",
  "--hard",
  "6acde7564f8b144a83b0368cfd75187ae5717fc8",
  "&&",
  "git",
  "submodule",
  "update",
  "--init",
]
cwd = "array-api-tests"
depends-on = ["clone-xp-tests"]
default-environment = "ci-py313"

[feature.xp-tests.tasks.xp-tests]
# run tests
cmd = [
  "pytest",
  "-v",
  "-rxXfE",
  "-W",
  # https://github.com/data-apis/array-api-tests/issues/284
  "ignore::UserWarning",
  # https://github.com/data-apis/array-api-tests/issues/329
  "--disable-extension",
  "fft",
  "--disable-extension",
  "linalg",
  "--xfails-file",
  "../tools/xp-tests-xfails.txt",
  "--skips-file",
  "../tools/xp-tests-skips.txt",
  "--max-examples=100",
  "--derandomize",
  "--disable-deadline",
  "array_api_tests/",
]
env.ARRAY_API_TESTS_MODULE = "mparray"
cwd = "array-api-tests"
depends-on = ["checkout-xp-tests"]
default-environment = "ci-py313"

## python versions

[feature.py310.dependencies]
python = "~=3.10.0"

[feature.py313.dependencies]
python = "~=3.13.0"
