[workspace]
authors = ["Matt Haberland <matt.haberland@gmail.com>"]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]

# `mparray` package definition 

[package.build.backend]
name = "pixi-build-python"
version = "*"

[package.host-dependencies]
uv = "*"

[package.run-dependencies]
numpy = "*"
mpmath = "*"
scipy = "*"

# environment definitions

[environments]
default = { solve-group = "default" }
tests = { features = ["tests"], solve-group = "default" }
# lint = { features = ["lint"], solve-group = "default" }
# docs = { features = ["docs"], solve-group = "default" }
# dev = { features = ["tests", "xp-tests", "lint", "docs", "dev"], solve-group = "default" }
dev = { features = ["tests", "xp-tests", "dev"], solve-group = "default" }
ci-py310 = ["py310", "tests", "xp-tests"]
ci-py313 = ["py313", "tests", "xp-tests"]
ci-upstream-dev = ["test-upstream-dev", "tests"]

# default feature definition

[dev]
# pulls in host and run dependencies
mparray.path = "."

[dependencies]
mparray.path = "."

# non-default feature definitions

## tests

[feature.tests.dependencies]
pytest = "*"
pytest-reportlog = "*"
pytest-cov = "*"
pytest-xdist = "*"

[feature.tests.tasks.tests]
cmd = "pytest tests/ -v"
default-environment = "tests"

[feature.tests.tasks.tests-cov]
cmd = "pytest tests/ -v -ra --cov=mparray --cov-report=xml --cov-report=term --durations=20"
default-environment = "tests"

[feature.tests.tasks.coverage]
cmd = "coverage html"
depends-on = "tests-cov"
default-environment = "tests"

[feature.tests.tasks.open-coverage]
cmd = "copen htmlcov/index.html"
depends-on = "coverage"
default-environment = "tests"

[feature.tests.tasks.tests-log]
cmd = "pytest tests/ --report-log output-log.jsonl"
default-environment = "tests"

